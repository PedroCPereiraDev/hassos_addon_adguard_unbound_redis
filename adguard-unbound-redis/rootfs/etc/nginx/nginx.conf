worker_processes auto;
pid /run/nginx.pid;
error_log stderr;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/includes/server_params.conf;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend {
        server 127.0.0.1:3000;
    }

    include /etc/nginx/servers/*.conf;
}
